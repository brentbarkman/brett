name: Brett
options:
  bundleIdPrefix: com.brett
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: Brett/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.brett.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_LANGUAGE: en
    INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity

targets:
  Brett:
    type: application
    platform: iOS
    sources:
      - path: Brett
        excludes:
          - "**/*.xcassets"
      - path: Brett/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brett.app
        INFOPLIST_FILE: Brett/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"

  BrettTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BrettTests
    dependencies:
      - target: Brett
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brett.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Brett.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Brett"
        BUNDLE_LOADER: "$(TEST_HOST)"

  BrettUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BrettUITests
    dependencies:
      - target: Brett
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brett.app.uitests
        TEST_TARGET_NAME: Brett

schemes:
  Brett:
    build:
      targets:
        Brett: all
        BrettTests: [test]
        BrettUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BrettTests
        - BrettUITests
  BrettUITestsOnly:
    build:
      targets:
        Brett: all
        BrettUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BrettUITests
