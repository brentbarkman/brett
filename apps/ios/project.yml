name: Brett
options:
  bundleIdPrefix: com.brett
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

# SPM dependencies. Kept minimal on purpose — every entry here is justified
# below. If you're tempted to add a generic utility package, see if we can
# do it in first-party Swift instead (the codebase prefers zero-dep).
packages:
  # GoogleSignIn-iOS — native Google sign-in. Gives users the system
  # account chooser that reads from Gmail / YouTube / Drive if those apps
  # are installed, so first-time sign-in is ~one tap for most users.
  # Verified on the server via /api/auth/ios/google/token.
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: FQUJNV9M6S
    CODE_SIGN_STYLE: Automatic
    # INFOPLIST_FILE is overridden per-configuration below so Debug builds
    # get Info-Debug.plist (which has ATS exceptions for the LAN dev API)
    # while Release builds get Info.plist (no exceptions). Without this
    # split, the TestFlight / App Store binary would ship with the LAN-IP
    # ATS exception embedded — an App Store review concern plus a
    # defense-in-depth hole.
    INFOPLIST_FILE: Brett/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.brett.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_LANGUAGE: en
    INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
  configs:
    # Per-config API URL — Info.plist references $(BRETT_API_URL) so the
    # Debug build (Xcode → Run on device / simulator) hits the local dev
    # server and Release builds (TestFlight, App Store) always hit prod.
    # Previously hardcoded in Info.plist which meant TestFlight builds
    # shipped pointing at Brent's LAN IP — the app silently fell back to
    # whatever that IP resolved to on the tester's network.
    Debug:
      BRETT_API_URL: http://192.168.50.242:3001
      # Debug-only Info.plist with NSExceptionDomains for the LAN dev API.
      INFOPLIST_FILE: Brett/Info-Debug.plist
      # Dev Google Cloud project iOS OAuth client
      GOOGLE_IOS_CLIENT_ID: 1055113004459-1go91rointqkletog9sc2o4t3ivfph6u.apps.googleusercontent.com
      GOOGLE_IOS_URL_SCHEME: com.googleusercontent.apps.1055113004459-1go91rointqkletog9sc2o4t3ivfph6u
    Release:
      BRETT_API_URL: https://api.brett.brentbarkman.com
      # Release Info.plist has no ATS exceptions (inherits base INFOPLIST_FILE).
      # Prod Google Cloud project iOS OAuth client (audience Railway's
      # GOOGLE_IOS_CLIENT_ID verifies against). Must match or sign-in 401s.
      GOOGLE_IOS_CLIENT_ID: 64916321230-ht3ctvt0kqc8o7a1s1gca2p1r5mmf3uj.apps.googleusercontent.com
      GOOGLE_IOS_URL_SCHEME: com.googleusercontent.apps.64916321230-ht3ctvt0kqc8o7a1s1gca2p1r5mmf3uj
  # Don't set CODE_SIGN_IDENTITY explicitly when CODE_SIGN_STYLE is Automatic —
  # Xcode picks Apple Development for Debug and Apple Distribution for Release
  # on its own based on the build configuration.

targets:
  Brett:
    type: application
    platform: iOS
    sources:
      - path: Brett
        excludes:
          - "**/*.xcassets"
      - path: Brett/Assets.xcassets
      # Bundled resources — non-code payloads we want copied into the
      # .app at build time (e.g. `background-manifest.json` for the
      # wallpaper picker). `buildPhase: resources` tells xcodegen to
      # route these through "Copy Bundle Resources" instead of trying
      # to compile them as Swift.
      - path: Brett/Resources
        buildPhase: resources
      # Share-extension-shared files — SharePayload and SharedConfig are
      # used by both the main app (for ShareIngestor reconciliation and
      # the URL mirror) and the extension (for payload building + queue
      # persistence). Pulled into both targets to avoid a separate module.
      - path: Brett-ShareExtension/Shared
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      # Embed the share extension into the main app's .app bundle under
      # PlugIns/. Without this, iOS won't install the extension.
      - target: BrettShareExtension
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brett.app
        INFOPLIST_FILE: Brett/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        CODE_SIGN_ENTITLEMENTS: Brett/Brett.entitlements

  BrettShareExtension:
    type: app-extension
    platform: iOS
    sources:
      # Explicit list so Shared/ isn't double-compiled — the extension
      # source root is just this target's Swift files, plus the shared ones.
      - path: Brett-ShareExtension
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brett.app.ShareExtension
        INFOPLIST_FILE: Brett-ShareExtension/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: Brett-ShareExtension/BrettShareExtension.entitlements
        # Extensions need their own versioning but must match the host app
        # to pass App Store validation.
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        # Share extensions have a strict memory budget — skip the launch
        # storyboard and keep the extension headless.
        GENERATE_INFOPLIST_FILE: "NO"

  BrettTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BrettTests
    dependencies:
      - target: Brett
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brett.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Brett.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Brett"
        BUNDLE_LOADER: "$(TEST_HOST)"
        # Reuse the host app's entitlements so tests that touch the shared
        # keychain access group (e.g. KeychainEdgeTests) can read/write.
        # Without this, tests run with only the default group and get
        # errSecMissingEntitlement (-34018) on any shared-group read.
        CODE_SIGN_ENTITLEMENTS: Brett/Brett.entitlements

  BrettUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BrettUITests
    dependencies:
      - target: Brett
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brett.app.uitests
        TEST_TARGET_NAME: Brett

schemes:
  Brett:
    build:
      targets:
        Brett: all
        BrettShareExtension: all
        BrettTests: [test]
        BrettUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      # Use an explicit xctestplan so Swift Testing (`@Test` / `@Suite`)
      # discovery works under Xcode 26. Without a test plan the XCTest
      # runner silently ignores Swift Testing methods — the xcodebuild
      # output shows "Executed 0 tests" for the whole unit target even
      # though the bundle links against the Testing framework. See
      # Brett.xctestplan at the project root.
      testPlans:
        - path: Brett.xctestplan
          defaultPlan: true
  BrettUITestsOnly:
    build:
      targets:
        Brett: all
        BrettUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BrettUITests
