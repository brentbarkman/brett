<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="60%">
      <stop offset="0%" stop-color="#181C2A"/>
      <stop offset="100%" stop-color="#0C0F15"/>
    </radialGradient>
    <radialGradient id="sphere" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FBE88A"/>
      <stop offset="40%" stop-color="#E8B931"/>
      <stop offset="100%" stop-color="#A67B10"/>
    </radialGradient>
    <linearGradient id="cerulean" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5A9AD6"/>
      <stop offset="100%" stop-color="#3A6FA8"/>
    </linearGradient>
    <linearGradient id="borderGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5D96B" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#C49A1A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#F2D04A" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Base squircle -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="url(#borderGold)" stroke-width="0.5"/>

  <!-- Brett's mark: gold sphere + cerulean line, scaled 1.2x for fuller bleed
       (smaller factor than base/active because the mark is already bigger here) -->
  <g transform="translate(16 16) scale(1.2) translate(-16 -16)">
    <circle cx="10" cy="16" r="4" fill="url(#sphere)"/>
    <rect x="17" y="14.75" width="11" height="2.5" rx="1.25" fill="url(#cerulean)" opacity="0.7"/>
  </g>
</svg>
