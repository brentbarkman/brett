<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP: In production, Electron loads via app:// so 'self' covers everything.
      In dev, Vite's HMR needs 'unsafe-inline' for scripts and data: for fonts.
      The main process sets a stricter CSP for production via session.webRequest.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' http://localhost:*; script-src 'self' 'unsafe-inline' http://localhost:*; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http://localhost:*; media-src 'self' http://localhost:* https://*.railway.app https://*.brentbarkman.com; connect-src 'self' http://localhost:* ws://localhost:* https://*.railway.app https://*.brentbarkman.com; font-src 'self' data:; frame-src https://www.youtube.com https://open.spotify.com https://embed.podcasts.apple.com https://*.railway.app;" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Brett</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
