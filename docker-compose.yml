services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: brett
      POSTGRES_PASSWORD: brett_dev
      POSTGRES_DB: brett_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-setup:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/brett;
      mc anonymous set download local/brett/public;
      mc mb --ignore-existing local/brett-releases;
      mc anonymous set download local/brett-releases/releases;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
