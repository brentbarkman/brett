name: Release

on:
  push:
    branches: [release]
    paths-ignore:
      - 'apps/ios/**'

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: brett
          POSTGRES_PASSWORD: brett_dev
          POSTGRES_DB: brett_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @brett/api exec prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Run migrations on test DB
        run: pnpm --filter @brett/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://brett:brett_dev@localhost:5432/brett_test

      - name: Run integration tests
        run: pnpm test:ci
        env:
          DATABASE_URL: postgresql://brett:brett_dev@localhost:5432/brett_test
          BETTER_AUTH_SECRET: test-secret-at-least-32-characters-long
          BETTER_AUTH_URL: http://localhost:3001
          GOOGLE_CLIENT_ID: test-google-client-id
          GOOGLE_CLIENT_SECRET: test-google-client-secret

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @brett/api exec prisma generate

      - name: Deploy API to Railway
        run: npx @railway/cli up --service 885a5f01-827b-4b29-a15f-3e9fee4fcb4e --environment 628d3da3-9677-4c8c-a151-52e8e9992f94
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for API to be healthy
        run: |
          echo "Waiting for API to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf https://api.brett.brentbarkman.com/health > /dev/null 2>&1; then
              echo "API is healthy!"
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, waiting 10s..."
            sleep 10
          done
          echo "API failed to become healthy after 5 minutes"
          exit 1

      # Desktop and iOS releases are built and published locally on macOS —
      # see scripts/release.sh. GitHub's Mac runners are paid for private
      # repos, and the Developer ID cert / notarytool profile / App Store
      # Connect API key all live in the login keychain anyway.
