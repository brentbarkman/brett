name: Release

on:
  push:
    branches: [main]

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: brett
          POSTGRES_PASSWORD: brett_dev
          POSTGRES_DB: brett_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-based versioning

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Compute version from base version + commit count (e.g. 0.1.47)
      # Never committed — no push back to main, no divergence
      - name: Compute version
        run: |
          BASE=$(node -p "require('./apps/desktop/package.json').version.split('.').slice(0,2).join('.')")
          PATCH=$(git rev-list --count HEAD)
          VERSION="${BASE}.${PATCH}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Desktop version: $VERSION"
          # Patch package.json in-place for electron-builder + vite (not committed)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('apps/desktop/package.json', 'utf-8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('apps/desktop/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Generate Prisma client
        run: pnpm --filter @brett/api exec prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Run migrations on test DB
        run: pnpm --filter @brett/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://brett:brett_dev@localhost:5432/brett_test

      - name: Run integration tests
        run: pnpm test:ci
        env:
          DATABASE_URL: postgresql://brett:brett_dev@localhost:5432/brett_test
          BETTER_AUTH_SECRET: test-secret-at-least-32-characters-long
          BETTER_AUTH_URL: http://localhost:3001
          GOOGLE_CLIENT_ID: test-google-client-id
          GOOGLE_CLIENT_SECRET: test-google-client-secret

      - name: Deploy API to Railway
        run: npx @railway/cli up --service 885a5f01-827b-4b29-a15f-3e9fee4fcb4e --environment 628d3da3-9677-4c8c-a151-52e8e9992f94
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Build desktop
        run: pnpm --filter @brett/desktop electron:build -- --mac --publish never
        env:
          VITE_API_URL: https://api.brett.brentbarkman.com
          STORAGE_ENDPOINT: ${{ secrets.STORAGE_ENDPOINT }}
          STORAGE_BUCKET: ${{ secrets.STORAGE_BUCKET }}
          RELEASE_STORAGE_ENDPOINT: ${{ secrets.RELEASE_STORAGE_ENDPOINT }}
          RELEASE_STORAGE_BUCKET: ${{ secrets.RELEASE_STORAGE_BUCKET }}

      - name: Upload release artifacts to S3
        run: npx tsx scripts/upload-release.ts
        env:
          RELEASE_STORAGE_ENDPOINT: ${{ secrets.RELEASE_STORAGE_ENDPOINT }}
          RELEASE_STORAGE_ACCESS_KEY: ${{ secrets.RELEASE_STORAGE_ACCESS_KEY }}
          RELEASE_STORAGE_SECRET_KEY: ${{ secrets.RELEASE_STORAGE_SECRET_KEY }}
          RELEASE_STORAGE_BUCKET: ${{ secrets.RELEASE_STORAGE_BUCKET }}
